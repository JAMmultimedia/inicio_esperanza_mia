<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Esperanza Mia FM — En Vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #5ba3d9;
      --gold-light: #89c4f0;
      --gold-dark: #2a6fa8;
      --cream: #eef4fb;
      --brown-deep: #080e1a;
      --brown-mid: #0d1a2e;
      --brown-warm: #102240;
      --text-main: #dceeff;
      --text-muted: #7aadcf;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--brown-deep);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* Radial glow background */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(91,163,217,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(42,111,168,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(91,163,217,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Decorative rings */
    .rings {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      pointer-events: none;
    }
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(91,163,217,0.08);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .ring:nth-child(1) { width: 300px; height: 300px; }
    .ring:nth-child(2) { width: 460px; height: 460px; border-color: rgba(91,163,217,0.05); }
    .ring:nth-child(3) { width: 640px; height: 640px; border-color: rgba(91,163,217,0.03); }

    /* CARD */
    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: 95vw;
      background: linear-gradient(160deg, rgba(13,26,46,0.97) 0%, rgba(8,14,26,0.99) 100%);
      border: 1px solid rgba(91,163,217,0.22);
      border-radius: 24px;
      padding: 52px 44px 44px;
      box-shadow:
        0 0 0 1px rgba(91,163,217,0.05),
        0 40px 80px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(91,163,217,0.15);
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top ornament */
    .ornament {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeUp 1s 0.1s ease both;
    }
    .ornament svg {
      width: 80px;
      opacity: 0.85;
    }

    /* Antenna pulse indicator */
    .live-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
      animation: fadeUp 1s 0.2s ease both;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e05c5c;
      box-shadow: 0 0 0 0 rgba(224,92,92,0.5);
      animation: pulse-ring 1.5s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(224,92,92,0.6); }
      70%  { box-shadow: 0 0 0 10px rgba(224,92,92,0); }
      100% { box-shadow: 0 0 0 0 rgba(224,92,92,0); }
    }
    .live-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e05c5c;
    }

    /* Title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.7rem;
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
      color: var(--gold-light);
      letter-spacing: -0.5px;
      text-shadow: 0 2px 30px rgba(91,163,217,0.35);
      margin-bottom: 6px;
      animation: fadeUp 1s 0.25s ease both;
    }
    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 40px;
      animation: fadeUp 1s 0.3s ease both;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      animation: fadeUp 1s 0.35s ease both;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(91,163,217,0.35), transparent); }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    /* Player */
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeUp 1s 0.4s ease both;
    }

    /* Play button */
    .play-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, var(--gold-light), var(--gold-dark));
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow:
        0 0 0 12px rgba(91,163,217,0.1),
        0 0 0 24px rgba(91,163,217,0.05),
        0 8px 32px rgba(91,163,217,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .play-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 0 14px rgba(91,163,217,0.14),
        0 0 0 28px rgba(91,163,217,0.07),
        0 12px 40px rgba(91,163,217,0.45);
    }
    .play-btn:active { transform: scale(0.97); }
    .play-btn svg { fill: #06101e; width: 30px; height: 30px; margin-left: 4px; }
    .play-btn.playing svg { margin-left: 0; }

    /* Waveform bars */
    .waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 36px;
    }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--gold);
      opacity: 0.6;
      height: 8px;
      transition: height 0.1s ease;
    }
    .waveform.active .bar {
      animation: wave var(--d, 0.8s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
    }
    @keyframes wave {
      from { height: 4px; opacity: 0.4; }
      to   { height: var(--h, 28px); opacity: 0.9; }
    }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .vol-icon { color: var(--text-muted); flex-shrink: 0; }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(91,163,217,0.2);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(91,163,217,0.6);
    }

    /* Status text */
    .status {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-top: -8px;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(122,173,207,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: fadeUp 1s 0.5s ease both;
    }

    /* Loading spinner on button */
    .spinner {
      display: none;
      width: 28px; height: 28px;
      border: 3px solid rgba(8,14,26,0.3);
      border-top-color: #06101e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .play-btn.loading svg { display: none; }
    .play-btn.loading .spinner { display: block; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <div class="card">

    <!-- SVG Ornament / microphone icon -->
    <div class="ornament">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 30 Q20 10 40 10 Q60 10 70 30" stroke="#5ba3d9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
        <path d="M18 30 Q26 16 40 16 Q54 16 62 30" stroke="#5ba3d9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
        <path d="M26 30 Q32 22 40 22 Q48 22 54 30" stroke="#5ba3d9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.9"/>
        <circle cx="40" cy="30" r="4" fill="#5ba3d9"/>
        <line x1="20" y1="50" x2="60" y2="50" stroke="#5ba3d9" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
        <line x1="40" y1="30" x2="40" y2="50" stroke="#5ba3d9" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="live-badge">
      <div class="pulse-dot" id="pulseDot"></div>
      <span class="live-text" id="liveLabel">Conectando...</span>
    </div>

    <h1>Esperanza Mia</h1>
    <p class="subtitle">Donde la fe se escucha y la esperanza se siente</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="player">

      <button class="play-btn" id="playBtn" title="Reproducir">
        <div class="spinner"></div>
        <!-- Play icon -->
        <svg id="iconPlay" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
        <!-- Pause icon (hidden initially) -->
        <svg id="iconPause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <div class="waveform" id="waveform">
        <!-- bars generated by JS -->
      </div>

      <div class="volume-row">
        <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.85"/>
        <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </div>

      <span class="status" id="statusText">Presiona play para escuchar</span>
    </div>

    <div class="footer">© 2025 Esperanza Mia FM &nbsp;·&nbsp; Todos los derechos reservados</div>
  </div>

  <audio id="radioAudio" preload="none">
    <source src="https://radio.esperanzamiafm.com/listen/esperanza_mia/radio.mp3" type="audio/mpeg"/>
  </audio>

  <script>
    const audio = document.getElementById('radioAudio');
    const playBtn = document.getElementById('playBtn');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const volumeSlider = document.getElementById('volume');
    const statusText = document.getElementById('statusText');
    const waveform = document.getElementById('waveform');
    const liveLabel = document.getElementById('liveLabel');
    const pulseDot = document.getElementById('pulseDot');

    // Generate waveform bars
    const barHeights = [10, 18, 28, 22, 34, 28, 16, 30, 24, 36, 20, 28, 14, 32, 26, 18, 34, 22, 28, 12];
    barHeights.forEach((h, i) => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.setProperty('--h', h + 'px');
      bar.style.setProperty('--d', (0.6 + Math.random() * 0.6).toFixed(2) + 's');
      bar.style.setProperty('--delay', (i * 0.04).toFixed(2) + 's');
      waveform.appendChild(bar);
    });

    audio.volume = parseFloat(volumeSlider.value);
    let isPlaying = false;

    function setLoading(v) {
      playBtn.classList.toggle('loading', v);
    }

    function setPlaying(v) {
      isPlaying = v;
      iconPlay.style.display  = v ? 'none' : 'block';
      iconPause.style.display = v ? 'block' : 'none';
      playBtn.classList.toggle('playing', v);
      waveform.classList.toggle('active', v);
      statusText.textContent = v ? 'Transmitiendo en vivo 🎶' : 'Presiona play para escuchar';
      liveLabel.textContent  = v ? 'En Vivo' : 'Radio Esperanza Mia';
      pulseDot.style.background = v ? '#e05c5c' : '#888';
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        setPlaying(false);
      } else {
        setLoading(true);
        statusText.textContent = 'Conectando...';
        // Force reload stream each time to avoid cache
        audio.load();
        audio.play().catch(e => {
          setLoading(false);
          statusText.textContent = 'Error al conectar. Intenta de nuevo.';
        });
      }
    });

    audio.addEventListener('playing', () => {
      setLoading(false);
      setPlaying(true);
    });

    audio.addEventListener('waiting', () => {
      statusText.textContent = 'Conectando...';
    });

    audio.addEventListener('ended', () => setPlaying(false));
    audio.addEventListener('error', () => {
      setLoading(false);
      setPlaying(false);
      statusText.textContent = 'Error al conectar. Intenta de nuevo.';
    });

    volumeSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volumeSlider.value);
    });
  </script>
</body>
</html>
